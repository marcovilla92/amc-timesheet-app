<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1e88e5" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0f1419" media="(prefers-color-scheme: dark)">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="css/style.css">
    <title>AMC Timesheet</title>
</head>
<body>

<!-- SVG icon sprite (display:none, riusato via <use href>) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
        <symbol id="icon-clock" viewBox="0 0 24 24">
            <path fill="currentColor" d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm.5 11H7v-2h4V6h1.5v7z"/>
        </symbol>
        <symbol id="icon-calendar" viewBox="0 0 24 24">
            <path fill="currentColor" d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/>
        </symbol>
        <symbol id="icon-folder" viewBox="0 0 24 24">
            <path fill="currentColor" d="M10 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-8l-2-2z"/>
        </symbol>
        <symbol id="icon-task" viewBox="0 0 24 24">
            <path fill="currentColor" d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-9 14l-5-5 1.4-1.4 3.6 3.6 7.6-7.6L19 8l-9 9z"/>
        </symbol>
        <symbol id="icon-note" viewBox="0 0 24 24">
            <path fill="currentColor" d="M14 17H4v-2h10v2zm6-4H4v-2h16v2zm0-4H4V7h16v2z"/>
        </symbol>
        <symbol id="icon-plus" viewBox="0 0 24 24">
            <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
        </symbol>
        <symbol id="icon-check" viewBox="0 0 24 24">
            <path fill="currentColor" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
        </symbol>
        <symbol id="icon-trash" viewBox="0 0 24 24">
            <path fill="currentColor" d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
        </symbol>
        <symbol id="icon-edit" viewBox="0 0 24 24">
            <path fill="currentColor" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
        </symbol>
        <symbol id="icon-pin" viewBox="0 0 24 24">
            <path fill="currentColor" d="M12 2a8 8 0 0 0-8 8c0 5.4 7 11.5 7.3 11.7a1 1 0 0 0 1.4 0C13 21.5 20 15.4 20 10a8 8 0 0 0-8-8zm0 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>
        </symbol>
        <symbol id="icon-warning" viewBox="0 0 24 24">
            <path fill="currentColor" d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>
        </symbol>
        <symbol id="icon-info" viewBox="0 0 24 24">
            <path fill="currentColor" d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
        </symbol>
        <symbol id="icon-arrow-left" viewBox="0 0 24 24">
            <path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </symbol>
        <symbol id="icon-suggest" viewBox="0 0 24 24">
            <path fill="currentColor" d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19A7 7 0 0 0 5 9c0 2.38 1.19 4.47 3 5.74V17a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-2.26C17.81 13.47 19 11.38 19 9a7 7 0 0 0-7-7z"/>
        </symbol>
        <symbol id="icon-repeat" viewBox="0 0 24 24">
            <path fill="currentColor" d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
        </symbol>
        <symbol id="icon-car" viewBox="0 0 24 24">
            <path fill="currentColor" d="M18.92 5.01C18.72 4.42 18.16 4 17.5 4h-11c-.66 0-1.21.42-1.42 1.01L3 11v8a1 1 0 0 0 1 1h1a1 1 0 0 0 1-1v-1h12v1a1 1 0 0 0 1 1h1a1 1 0 0 0 1-1v-8l-2.08-5.99zM6.5 15a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm11 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zM5 10l1.5-4.5h11L19 10H5z"/>
        </symbol>
        <symbol id="icon-tool" viewBox="0 0 24 24">
            <path fill="currentColor" d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/>
        </symbol>
    </defs>
</svg>

<header class="app-header">
    <div class="brand">
        <span class="brand-icon"><svg><use href="#icon-clock"/></svg></span>
        <h1>AMC Timesheet</h1>
    </div>
    <span class="status-pill online" id="connection-status" aria-live="polite">online</span>
</header>

<!-- ============================================================ -->
<!-- VISTA "TODAY" — lista timesheet del giorno + suggerimenti FSM -->
<!-- ============================================================ -->
<main class="container" id="view-today">

    <section class="card date-card">
        <div class="date-controls">
            <button type="button" class="btn-icon" id="date-prev" aria-label="Giorno precedente">‹</button>
            <label class="date-field">
                <svg><use href="#icon-calendar"/></svg>
                <input type="date" id="current-date" aria-label="Data selezionata">
            </label>
            <button type="button" class="btn-icon" id="date-next" aria-label="Giorno successivo">›</button>
        </div>
        <div class="totals">
            <span class="totals-label">Totale ore</span>
            <span class="totals-value" id="total-hours">0.0</span>
        </div>
    </section>

    <div class="presets-row" id="presets-row" aria-label="Progetti frequenti">
        <button type="button" class="repeat-btn" id="repeat-last" disabled>
            <svg><use href="#icon-repeat"/></svg> Ripeti ultima
        </button>
    </div>

    <section class="card" id="suggestions-section">
        <h2 class="card-title">
            <span class="card-title-icon"><svg><use href="#icon-suggest"/></svg> Suggeriti</span>
        </h2>
        <ul class="suggestions-list" id="suggestions-list" aria-live="polite">
            <li class="skeleton-card"><div class="skeleton-line w-70 tall"></div><div class="skeleton-line w-50"></div></li>
            <li class="skeleton-card"><div class="skeleton-line w-50 tall"></div><div class="skeleton-line w-70"></div></li>
        </ul>
    </section>

    <section class="card" id="entries-section">
        <h2 class="card-title">
            <span class="card-title-icon"><svg><use href="#icon-check"/></svg> Ore inserite</span>
        </h2>
        <ul class="entry-list" id="entry-list" aria-live="polite">
            <li class="skeleton-entry"><div class="skeleton-line w-70"></div><div class="skeleton-line w-100"></div></li>
            <li class="skeleton-entry"><div class="skeleton-line w-50"></div><div class="skeleton-line w-100"></div></li>
        </ul>
    </section>

</main>

<!-- ============================================================ -->
<!-- VISTA "FORM" — aggiungi/modifica timesheet                   -->
<!-- ============================================================ -->
<main class="container hidden" id="view-form">

    <section class="card">
        <h2 class="card-title">
            <button type="button" class="btn-link back" id="form-back" aria-label="Indietro">
                <svg><use href="#icon-arrow-left"/></svg>
            </button>
            <span class="card-title-icon" id="form-title">Nuova ora</span>
        </h2>

        <form id="entry-form" autocomplete="off" novalidate>
            <input type="hidden" id="form-id" value="">

            <div class="field">
                <label for="form-date" class="field-label">
                    <svg><use href="#icon-calendar"/></svg> Data
                </label>
                <input type="date" id="form-date" name="date" required>
            </div>

            <div class="field">
                <span class="field-label">
                    <svg><use href="#icon-tool"/></svg> Tipo
                </span>
                <div class="tipo-toggle" role="radiogroup" aria-label="Tipo di registrazione">
                    <input type="radio" name="tipo" id="tipo-lavoro" value="lavoro" checked>
                    <label for="tipo-lavoro">Lavoro</label>
                    <input type="radio" name="tipo" id="tipo-viaggio" value="viaggio">
                    <label for="tipo-viaggio">Viaggio</label>
                </div>
            </div>

            <div class="field">
                <label for="form-project-search" class="field-label">
                    <svg><use href="#icon-folder"/></svg> Progetto *
                </label>
                <input type="text" id="form-project-search"
                       placeholder="Cerca progetto..." autocomplete="off"
                       inputmode="search">
                <input type="hidden" id="form-project-id" value="">
                <ul class="suggestions" id="project-suggestions" role="listbox"></ul>
                <div class="selected-chip hidden" id="form-project-chip">
                    <span class="chip-label" id="form-project-label"></span>
                    <button type="button" class="chip-clear" id="form-project-clear" aria-label="Rimuovi">×</button>
                </div>
            </div>

            <div class="field">
                <label for="form-task-search" class="field-label">
                    <svg><use href="#icon-task"/></svg> Task (opzionale)
                </label>
                <input type="text" id="form-task-search"
                       placeholder="Cerca task..." autocomplete="off"
                       inputmode="search" disabled>
                <input type="hidden" id="form-task-id" value="">
                <ul class="suggestions" id="task-suggestions" role="listbox"></ul>
                <div class="selected-chip hidden" id="form-task-chip">
                    <span class="chip-label" id="form-task-label"></span>
                    <button type="button" class="chip-clear" id="form-task-clear" aria-label="Rimuovi">×</button>
                </div>
            </div>

            <div class="field">
                <label for="form-hours" class="field-label">
                    <svg><use href="#icon-clock"/></svg> Ore *
                </label>
                <input type="number" id="form-hours" name="unit_amount"
                       inputmode="decimal" step="0.5" min="0.5" max="24"
                       placeholder="es. 8" required>
            </div>

            <div class="field">
                <label for="form-name" class="field-label">
                    <svg><use href="#icon-note"/></svg> Descrizione
                </label>
                <textarea id="form-name" name="name" rows="2"
                          placeholder="Cosa hai fatto? (default /)"></textarea>
            </div>

            <button type="submit" class="btn-primary" id="form-submit">
                <svg><use href="#icon-check"/></svg> Salva
            </button>
        </form>
    </section>

</main>

<!-- Floating Action Button -->
<button type="button" class="fab" id="fab-add" aria-label="Aggiungi ora">
    <svg><use href="#icon-plus"/></svg>
</button>

<!-- Bottom sheet generico (conferma submit + delete + altre azioni critiche) -->
<div class="sheet-overlay" id="sheet-overlay"></div>
<div class="bottom-sheet" id="bottom-sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
    <div class="sheet-handle" aria-hidden="true"></div>
    <h3 id="sheet-title">Conferma</h3>
    <div class="sheet-body" id="sheet-body"></div>
    <div class="sheet-actions">
        <button type="button" class="primary" id="sheet-confirm">Conferma</button>
        <button type="button" class="secondary" id="sheet-cancel">Annulla</button>
    </div>
</div>

<!-- Toast stack -->
<div class="toast-stack" id="toast-stack" aria-live="polite" aria-atomic="true"></div>

<script src="config.js"></script>
<script src="js/storage.js"></script>
<script src="js/api.js"></script>
<script src="js/queue.js"></script>
<script src="js/app.js"></script>
</body>
</html>
